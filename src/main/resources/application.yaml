spring:
  application:
    name: memomemo-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/memomemo
#    username: ${DB_USER:memomemo}
#    password: ${DB_PASSWORD:memomemo}
    username: "memomemo"
    password: "memomemo"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

#  security:
#    oauth2:
#      client:
#        registration:
#          google:
#            client-id: ${GOOGLE_CLIENT_ID:}
#            client-secret: ${GOOGLE_CLIENT_SECRET:}
#            scope: profile, email
#          github:
#            client-id: ${GITHUB_CLIENT_ID:}
#            client-secret: ${GITHUB_CLIENT_SECRET:}
#            scope: read:user, user:email

  data:
    redis:
#      host: ${REDIS_HOST:localhost}
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

jwt:
  secret: ${JWT_SECRET:change-this-in-production-min-32-chars}
  access-token-expiry: 900
  refresh-token-expiry: 604800

#oauth2:
#  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}

file:
  storage:
    root-path: ${FILE_STORAGE_PATH:./data/files}
    max-size: 52428800  # 50MB

logging:
  level:
    com.memomemo: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
